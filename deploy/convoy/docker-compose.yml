name: sloth-convoy

services:
  sloth-convoy-db:
    image: mysql:8.0
    container_name: sloth-convoy-db
    restart: unless-stopped
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
    environment:
      MYSQL_DATABASE: ${CONVOY_DB_DATABASE}
      MYSQL_USER: ${CONVOY_DB_USERNAME}
      MYSQL_PASSWORD: ${CONVOY_DB_PASSWORD}
      MYSQL_RANDOM_ROOT_PASSWORD: "true"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -u$$MYSQL_USER -p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - sloth_convoy_db_data:/var/lib/mysql
    networks:
      - sloth-convoy-net

  sloth-convoy-redis:
    image: redis:7-alpine
    container_name: sloth-convoy-redis
    restart: unless-stopped
    environment:
      CONVOY_REDIS_PASSWORD: ${CONVOY_REDIS_PASSWORD}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${CONVOY_REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$CONVOY_REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - sloth_convoy_redis_data:/data
    networks:
      - sloth-convoy-net

  sloth-convoy-php:
    build:
      context: ../../Convoy panel-develop/panel-develop
      dockerfile: dockerfiles/php/Dockerfile
      args:
        APP_ENV: ${APP_ENV}
        PHP_XDEBUG: "false"
    container_name: sloth-convoy-php
    restart: unless-stopped
    env_file:
      - ../../runtime/env/convoy.env
    depends_on:
      sloth-convoy-db:
        condition: service_healthy
      sloth-convoy-redis:
        condition: service_healthy
    volumes:
      - ../../Convoy panel-develop/panel-develop:/var/www
    command: >-
      sh -lc "if [ ! -f /var/www/.env ] && [ -f /var/www/.env.example ]; then
      cp /var/www/.env.example /var/www/.env;
      fi;
      if [ ! -f /var/www/vendor/autoload.php ]; then
      php -r \"copy('https://getcomposer.org/installer','/tmp/composer-setup.php');\";
      php /tmp/composer-setup.php --install-dir=/usr/local/bin --filename=composer;
      composer install --working-dir=/var/www --no-interaction --prefer-dist --no-dev;
      rm -f /tmp/composer-setup.php;
      fi;
      if [ ! -f /var/www/public/build/manifest.json ]; then
      if ! command -v npm >/dev/null 2>&1; then
      apk add --no-cache nodejs npm;
      fi;
      npm --prefix /var/www install --no-audit --no-fund;
      npm --prefix /var/www run build;
      fi;
      mkdir -p /var/www/storage/logs /var/www/bootstrap/cache;
      chmod -R ug+rwX /var/www/storage /var/www/bootstrap/cache || true;
      if [ -f /var/www/.env ] && ! grep -q '^APP_KEY=base64:' /var/www/.env; then
      php /var/www/artisan key:generate --force || true;
      fi;
      php /var/www/artisan migrate --force || true;
      php-fpm"
    networks:
      - sloth-convoy-net

  sloth-convoy-workers:
    build:
      context: ../../Convoy panel-develop/panel-develop/dockerfiles/workers
      dockerfile: Dockerfile
      args:
        APP_ENV: ${APP_ENV}
    container_name: sloth-convoy-workers
    restart: unless-stopped
    env_file:
      - ../../runtime/env/convoy.env
    depends_on:
      sloth-convoy-db:
        condition: service_healthy
      sloth-convoy-redis:
        condition: service_healthy
    volumes:
      - ../../Convoy panel-develop/panel-develop:/var/www
    command: >-
      sh -lc "for i in $(seq 1 60); do
      [ -f /var/www/vendor/autoload.php ] && [ -f /var/www/public/build/manifest.json ] && break;
      sleep 2;
      done;
      if [ ! -f /var/www/vendor/autoload.php ]; then
      php -r \"copy('https://getcomposer.org/installer','/tmp/composer-setup.php');\";
      php /tmp/composer-setup.php --install-dir=/usr/local/bin --filename=composer;
      composer install --working-dir=/var/www --no-interaction --prefer-dist --no-dev;
      rm -f /tmp/composer-setup.php;
      fi;
      if [ ! -f /var/www/public/build/manifest.json ]; then
      if ! command -v npm >/dev/null 2>&1; then
      apk add --no-cache nodejs npm;
      fi;
      npm --prefix /var/www install --no-audit --no-fund;
      npm --prefix /var/www run build;
      fi;
      mkdir -p /var/www/storage/logs /var/www/bootstrap/cache;
      chmod -R ug+rwX /var/www/storage /var/www/bootstrap/cache || true;
      /usr/bin/supervisord -c /etc/supervisord.conf"
    networks:
      - sloth-convoy-net

  sloth-convoy-web:
    build:
      context: ../../Convoy panel-develop/panel-develop/dockerfiles/caddy
      dockerfile: Dockerfile
      args:
        APP_ENV: ${APP_ENV}
        APP_URL: ${APP_URL}
    container_name: sloth-convoy-web
    restart: unless-stopped
    env_file:
      - ../../runtime/env/convoy.env
    depends_on:
      - sloth-convoy-php
    ports:
      - "${CONVOY_HTTP_BIND}:80"
    volumes:
      - ../../Convoy panel-develop/panel-develop:/var/www
      - sloth_convoy_caddy_config:/config
      - sloth_convoy_caddy_data:/data
    networks:
      - sloth-convoy-net

networks:
  sloth-convoy-net:
    name: sloth-convoy-net
    driver: bridge

volumes:
  sloth_convoy_db_data:
    name: sloth-convoy-db-data
  sloth_convoy_redis_data:
    name: sloth-convoy-redis-data
  sloth_convoy_caddy_config:
    name: sloth-convoy-caddy-config
  sloth_convoy_caddy_data:
    name: sloth-convoy-caddy-data
